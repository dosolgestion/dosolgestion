<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOSOL GESTION – Comptabilité & Gestion Financière</title>
<meta name="description" content="DOSOL GESTION accompagne TPE, PME et professionnels de l'immobilier dans la gestion comptable, administrative et financière. Solutions sur mesure, à distance.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1F3C;--navy-mid:#1A3560;--navy-light:#2A4F8C;
  --accent:#C8A96E;--accent-light:#E8D5A8;
  --white:#FFFFFF;--off-white:#F7F6F2;--gray-light:#EFF1F5;
  --gray-mid:#B8BECC;--gray-text:#6B7385;--text:#1A1E2E;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --tr:0.22s ease;--nav-h:80px;
}
html,body{height:100%;margin:0;padding:0}
body{font-family:var(--sans);color:var(--text);background:var(--white);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);background:rgba(255,255,255,0.97);backdrop-filter:blur(10px);border-bottom:1px solid rgba(13,31,60,0.07);display:flex;align-items:center;justify-content:space-between;padding:0 4%;box-shadow:0 2px 20px rgba(13,31,60,0.04)}
.nav-logo{display:flex;align-items:center;cursor:pointer;height:100%;padding:8px 0}
.nav-logo img{height:60px;width:auto;transition:opacity var(--tr)}
.nav-logo img:hover{opacity:0.8}
.nav-center{display:flex;align-items:stretch;height:100%}
.tab-btn{background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:400;color:var(--gray-text);letter-spacing:0.4px;padding:0 1rem;height:100%;transition:color var(--tr),border-color var(--tr);white-space:nowrap}
.tab-btn:hover{color:var(--navy)}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--accent);font-weight:500}
.nav-right{display:flex;align-items:center;gap:1rem}
.nav-cta{background:var(--navy);color:var(--white);border:none;cursor:pointer;font-family:var(--sans);font-size:12.5px;font-weight:500;letter-spacing:0.6px;padding:9px 20px;border-radius:2px;text-decoration:none;transition:background var(--tr);white-space:nowrap}
.nav-cta:hover{background:var(--navy-light)}
.nav-hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;flex-direction:column;gap:5px}
.nav-hamburger span{display:block;width:22px;height:1.5px;background:var(--navy)}
.mobile-menu{display:none;position:fixed;top:var(--nav-h);left:0;right:0;background:var(--white);z-index:199;border-bottom:1px solid var(--gray-light);padding:1rem 0;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
.mobile-menu.open{display:block}
.mobile-tab{display:block;width:100%;background:none;border:none;text-align:left;padding:0.85rem 5%;font-family:var(--sans);font-size:14px;color:var(--gray-text);cursor:pointer;border-left:3px solid transparent;transition:color var(--tr),border-color var(--tr),background var(--tr)}
.mobile-tab:hover,.mobile-tab.active{color:var(--navy);border-left-color:var(--accent);background:var(--off-white)}

/* MAIN CONTENT AREA — single scrollable zone */
#app{margin-top:var(--nav-h);flex:1}

/* SHARED */
.section-wrap{padding:70px 7% 90px;max-width:1200px;margin:0 auto}
.section-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:.9rem;display:flex;align-items:center;gap:10px}
.section-tag::before{content:'';width:24px;height:1px;background:var(--accent)}
h2{font-family:var(--serif);color:var(--navy);font-size:clamp(1.75rem,3.2vw,2.7rem);font-weight:400;line-height:1.2;margin-bottom:.9rem}
h3{font-family:var(--serif);color:var(--navy);font-size:1.15rem;font-weight:500;margin-bottom:.9rem}
.section-intro{color:var(--gray-text);max-width:600px;font-size:.98rem;line-height:1.85;margin-bottom:3rem}

/* ACCUEIL */
.hero-wrap{background:var(--navy);min-height:calc(100vh - var(--nav-h));display:flex;align-items:center;position:relative;overflow:hidden}
.hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(200,169,110,0.055) 1px,transparent 1px),linear-gradient(90deg,rgba(200,169,110,0.055) 1px,transparent 1px);background-size:64px 64px}
.hero-vline{position:absolute;right:28%;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent 5%,rgba(200,169,110,0.2) 40%,rgba(200,169,110,0.2) 60%,transparent 95%)}
.hero-inner{max-width:1200px;margin:0 auto;width:100%;padding:60px 7%;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.hero-content{max-width:620px}
.hero-pill{display:inline-flex;align-items:center;gap:10px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:2.2rem}
.hero-pill::before{content:'';width:32px;height:1px;background:var(--accent)}
h1{font-family:var(--serif);color:var(--white);font-size:clamp(2.3rem,4.5vw,3.6rem);font-weight:400;line-height:1.15;margin-bottom:1.4rem}
h1 em{color:var(--accent);font-style:normal}
.hero-sub{color:var(--gray-mid);font-weight:300;font-size:1.02rem;max-width:520px;margin-bottom:2.5rem;line-height:1.85}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap}
.btn-gold{background:var(--accent);color:var(--navy);border:none;cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:500;letter-spacing:.5px;padding:13px 30px;border-radius:2px;transition:background var(--tr)}
.btn-gold:hover{background:var(--accent-light)}
.btn-ghost{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.22);cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:400;letter-spacing:.5px;padding:13px 30px;border-radius:2px;transition:border-color var(--tr),color var(--tr)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.hero-kpis{display:flex;flex-direction:column;gap:2rem;align-items:flex-end;padding-right:2%}
.kpi{text-align:right}
.kpi-n{font-family:var(--serif);color:var(--accent);font-size:2.4rem;font-weight:400;line-height:1}
.kpi-l{font-size:10.5px;color:var(--gray-mid);letter-spacing:1.8px;text-transform:uppercase;margin-top:3px}

/* PRESENTATION */
.pres-wrap{background:var(--off-white)}
.pres-grid{display:grid;grid-template-columns:.85fr 1fr;gap:5%;align-items:center}
.pres-card{background:var(--navy);padding:3rem 2.5rem;clip-path:polygon(0 0,88% 0,100% 12%,100% 100%,12% 100%,0 88%);display:flex;flex-direction:column;justify-content:space-between;min-height:400px}
.pres-name{font-family:var(--serif);color:var(--white);font-size:1.65rem;font-weight:400;line-height:1.2}
.pres-title{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-top:7px}
.pres-sep{width:40px;height:1px;background:var(--accent);margin:2rem 0}
.pres-desc{color:var(--gray-mid);font-size:.88rem;line-height:1.85;font-weight:300}
.pres-text p{color:var(--gray-text);line-height:1.95;margin-bottom:1.1rem;font-size:.96rem}
.pres-text p strong{color:var(--navy);font-weight:500}
.legal-box{margin-top:2rem;padding:1rem 1.25rem;border-left:3px solid var(--accent-light);background:rgba(200,169,110,0.07);font-size:.82rem;color:var(--gray-text);line-height:1.75;font-style:italic}

/* SERVICES */
.svc-wrap{background:var(--white)}
.services-grid{display:grid;grid-template-columns:repeat(2,1fr);border:1px solid var(--gray-light)}
.svc-card{padding:2.4rem 2.2rem;border-right:1px solid var(--gray-light);border-bottom:1px solid var(--gray-light);transition:background var(--tr)}
.svc-card:hover{background:var(--off-white)}
.svc-num{font-family:var(--serif);font-size:3.5rem;font-weight:400;color:var(--gray-light);line-height:1;margin-bottom:.8rem;transition:color var(--tr)}
.svc-card:hover .svc-num{color:rgba(200,169,110,0.3)}
.svc-list{list-style:none;margin-top:.5rem}
.svc-list li{font-size:.87rem;color:var(--gray-text);padding:5px 0;border-bottom:1px solid rgba(239,241,245,0.8);display:flex;align-items:flex-start;gap:8px}
.svc-list li:last-child{border-bottom:none}
.svc-list li::before{content:'–';color:var(--accent);flex-shrink:0;padding-top:1px}
.svc-tag{display:inline-block;margin-bottom:1rem;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);background:rgba(200,169,110,0.1);padding:3px 10px;border-radius:1px}

/* COMPETENCES */
.skills-wrap{background:var(--navy)}
.skills-wrap h2{color:var(--white)}
.skills-wrap .section-intro{color:var(--gray-mid)}
.skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,0.06)}
.skill-card{background:var(--navy);padding:2rem 1.8rem;border:1px solid rgba(200,169,110,0.08);transition:background var(--tr),border-color var(--tr)}
.skill-card:hover{background:var(--navy-mid);border-color:rgba(200,169,110,0.3)}
.sk-icon{font-size:1.5rem;margin-bottom:1rem}
.sk-title{color:var(--white);font-weight:500;font-size:.93rem;margin-bottom:.65rem}
.sk-desc{color:var(--gray-mid);font-size:.83rem;line-height:1.75;font-weight:300}

/* PARCOURS */
.parcours-wrap{background:var(--off-white)}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:3px;top:10px;bottom:10px;width:1px;background:linear-gradient(to bottom,var(--accent) 0%,rgba(200,169,110,0.2) 80%,transparent 100%)}
.tl-item{position:relative;margin-bottom:2.8rem}
.tl-dot{position:absolute;left:-28px;top:7px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--off-white);box-shadow:0 0 0 2px var(--accent)}
.tl-period{font-size:10.5px;letter-spacing:2.2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.tl-role{font-family:var(--serif);color:var(--navy);font-size:1.08rem;font-weight:500;line-height:1.3}
.tl-company{color:var(--gray-text);font-size:.88rem;margin-bottom:.7rem;margin-top:2px}
.tl-tasks{list-style:none}
.tl-tasks li{font-size:.86rem;color:var(--gray-text);padding:3px 0;display:flex;gap:8px;align-items:flex-start}
.tl-tasks li::before{content:'·';color:var(--accent);font-size:1.3em;line-height:1.15;flex-shrink:0}

/* CONTACT */
.contact-wrap{background:var(--navy)}
.contact-wrap h2{color:var(--white)}
.contact-wrap .section-intro{color:var(--gray-mid)}
.contact-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:5%;align-items:start}
.contact-info{display:flex;flex-direction:column;gap:1.2rem}
.ci-block{padding:1.25rem 1.5rem;border:1px solid rgba(255,255,255,0.08);border-radius:2px;transition:border-color var(--tr)}
.ci-block:hover{border-color:rgba(200,169,110,0.35)}
.ci-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.ci-val{color:var(--white);font-size:.93rem}
.ci-val a{color:var(--white);text-decoration:none;transition:color var(--tr)}
.ci-val a:hover{color:var(--accent)}
.contact-form{display:flex;flex-direction:column;gap:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray-mid);font-weight:400}
.form-group input,.form-group textarea{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:var(--white);font-family:var(--sans);font-size:14px;padding:11px 14px;border-radius:2px;transition:border-color var(--tr),background var(--tr);outline:none}
.form-group input::placeholder,.form-group textarea::placeholder{color:rgba(184,190,204,0.5)}
.form-group input:focus,.form-group textarea:focus{border-color:rgba(200,169,110,0.5);background:rgba(255,255,255,0.08)}
.form-group textarea{resize:vertical;min-height:120px}
.rgpd-check{display:flex;align-items:flex-start;gap:10px;font-size:.78rem;color:var(--gray-mid);line-height:1.6}
.rgpd-check input[type=checkbox]{margin-top:3px;accent-color:var(--accent);flex-shrink:0}
.rgpd-link{background:none;border:none;color:var(--accent);text-decoration:underline;cursor:pointer;font-size:inherit;padding:0;font-family:var(--sans)}
.btn-send{background:var(--accent);color:var(--navy);border:none;cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:600;letter-spacing:.6px;padding:13px 32px;border-radius:2px;align-self:flex-start;transition:background var(--tr);text-transform:uppercase}
.btn-send:hover{background:var(--accent-light)}
.form-success{display:none;padding:1rem 1.5rem;background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.3);color:var(--accent);border-radius:2px;font-size:.9rem;margin-top:.5rem}

/* MENTIONS */
.mentions-wrap{background:var(--white)}
.mentions-content{max-width:780px}
.ml-h{margin:2.5rem 0 .5rem;font-size:.9rem;color:var(--navy);text-transform:uppercase;letter-spacing:1px;font-family:var(--sans);font-weight:600}
.ml-h:first-child{margin-top:0}
.ml-sep{width:40px;height:2px;background:var(--accent);margin-bottom:1.2rem}
.mentions-content p{color:var(--gray-text);font-size:.9rem;line-height:1.85;margin-bottom:.7rem}
.mentions-content a{color:var(--navy-light);text-decoration:underline}

/* FOOTER */
footer{background:var(--navy);border-top:1px solid rgba(255,255,255,0.06);padding:1.8rem 7%;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.footer-left{display:flex;align-items:center;gap:14px}
.footer-logo img{height:42px;width:auto;filter:brightness(0) invert(1);opacity:0.7}
.footer-copy{font-size:.78rem;color:rgba(184,190,204,0.5)}
.footer-right{display:flex;gap:1.5rem;flex-wrap:wrap}
.footer-link{font-size:11.5px;color:rgba(184,190,204,0.5);cursor:pointer;background:none;border:none;text-decoration:none;letter-spacing:.3px;transition:color var(--tr);font-family:var(--sans)}
.footer-link:hover{color:var(--accent)}

@media(max-width:960px){
  .nav-center,.nav-cta{display:none}
  .nav-hamburger{display:flex}
  .hero-kpis{display:none}
  .pres-grid{grid-template-columns:1fr}
  .pres-card{clip-path:none;min-height:auto}
  .skills-grid{grid-template-columns:repeat(2,1fr)}
  .contact-grid{grid-template-columns:1fr}
}
@media(max-width:640px){
  .services-grid{grid-template-columns:1fr}
  .skills-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  footer{flex-direction:column;align-items:flex-start}
}
</style>
</head>

accueil: '<div class="hero-wrap"><div class="hero-grid"></div><div class="hero-vline"></div><div class="hero-inner"><div class="hero-content"><div class="hero-pill">Comptabilité &amp; Gestion Financière</div><h1>La clarté au cœur de<br><em>votre organisation</em></h1><p class="hero-sub">Gestion comptable, administrative et financière pour TPE, PME et professionnels de l\'immobilier. Des solutions sur mesure, à distance, adaptées à vos réalités.</p><div class="hero-btns"><button class="btn-gold" data-page="services">Découvrir les services</button><button class="btn-ghost" data-page="contact">Prendre contact</button></div></div><div class="hero-kpis"><div class="kpi"><div class="kpi-n">8+</div><div class="kpi-l">ans d\'expérience</div></div><div class="kpi"><div class="kpi-n">2&nbsp;000+</div><div class="kpi-l">unités gérées</div></div><div class="kpi"><div class="kpi-n">100%</div><div class="kpi-l">sur mesure</div></div></div></div></div>',

presentation: '<div class="pres-wrap"><div class="section-wrap"><div class="pres-grid"><div class="pres-card"><div><div class="pres-name">Dorian Haessler</div><div class="pres-title">Gérant – DOSOL GESTION</div></div><div class="pres-sep"></div><div class="pres-desc">Comptable expérimenté, bilingue français–anglais, avec un parcours en finance bancaire, comptabilité générale et gestion immobilière en France et au Canada.</div></div><div class="pres-text"><div class="section-tag">À propos</div><h2>Une expertise pluridisciplinaire à votre service</h2><p>Fort d\'un parcours de <strong>plus de huit ans</strong> en finance bancaire, gestion comptable et gestion immobilière, DOSOL GESTION accompagne les entreprises dans la gestion quotidienne et stratégique de leurs activités.</p><p>Que vous soyez une TPE, une PME, un grand groupe ou un professionnel de l\'immobilier, je propose des <strong>solutions entièrement adaptées</strong> à vos spécificités — soutien ponctuel, mission à moyen terme ou renfort en période de transition.</p><p>Toutes les missions sont réalisées <strong>à distance</strong>, avec rigueur, confidentialité et transparence. Chaque collaboration fait l\'objet d\'une offre personnalisée précisant les objectifs, les livrables, la durée et les modalités financières.</p><div class="legal-box">Toutes les missions sont réalisées en appui aux éventuelles équipes internes et en coordination avec un expert-comptable si nécessaire. DOSOL GESTION ne délivre pas de certifications comptables ou fiscales.</div></div></div></div></div>',

services: '<div class="svc-wrap"><div class="section-wrap"><div class="section-tag">Domaines d\'intervention</div><h2>Quatre pôles de compétences</h2><p class="section-intro">Des prestations modulables — externalisation partielle ou complète, appui ponctuel ou régulier — entièrement adaptées à vos besoins et à votre secteur.</p><div class="services-grid"><div class="svc-card"><div class="svc-num">01</div><div class="svc-tag">Finance interne</div><h3>Comptabilité &amp; gestion financière</h3><ul class="svc-list"><li>Tenue et mise à jour de la comptabilité générale et analytique</li><li>Rapprochements bancaires, lettrages et suivi de trésorerie</li><li>Reporting financier et tableaux de bord</li><li>Préparation de documents financiers simples pour suivi interne et pilotage</li></ul></div><div class="svc-card"><div class="svc-num">02</div><div class="svc-tag">Administration</div><h3>Gestion administrative &amp; organisationnelle</h3><ul class="svc-list"><li>Facturation, suivi des paiements et gestion fournisseurs</li><li>Classement et archivage numérique des documents comptables</li><li>Optimisation des procédures internes et organisation des flux administratifs</li><li>Coordination avec les cabinets comptables ou juridiques pour appui</li></ul></div><div class="svc-card"><div class="svc-num">03</div><div class="svc-tag">Immobilier</div><h3>Gestion immobilière</h3><ul class="svc-list"><li>Suivi comptable des copropriétés et SCI (budgets prévisionnels, appels de fonds, régularisation des charges)</li><li>Suivi des loyers, dépôts de garantie et baux</li><li>Assistance à la préparation des états comptables</li></ul></div><div class="svc-card"><div class="svc-num">04</div><div class="svc-tag">Conseil</div><h3>Conseil &amp; accompagnement opérationnel</h3><ul class="svc-list"><li>Analyse et interprétation des résultats financiers pour usage interne</li><li>Conseils en organisation, gestion et optimisation des process</li><li>Accompagnement des équipes sur les outils de gestion internes</li><li>Appui ponctuel ou régulier selon les besoins spécifiques du client</li></ul></div></div></div></div>',

competences: '<div class="skills-wrap"><div class="section-wrap"><div class="section-tag">Savoir-faire</div><h2>Des compétences transversales éprouvées</h2><p class="section-intro">Une polyvalence construite sur des expériences concrètes en environnements bancaires, comptables et immobiliers, en France et à l\'international.</p><div class="skills-grid"><div class="skill-card"><div class="sk-icon">📊</div><div class="sk-title">Comptabilité &amp; Fiscalité</div><div class="sk-desc">Comptabilité générale et analytique, révision comptable, saisie, clôtures mensuelles, bilans, liasses fiscales, déclarations TVA, rapprochements bancaires, écritures d\'inventaire.</div></div><div class="skill-card"><div class="sk-icon">🏢</div><div class="sk-title">Gestion immobilière</div><div class="sk-desc">Copropriétés et SCI, budgets prévisionnels, appels de fonds, suivi des baux et dépôts de garantie, régularisation des charges. Expérience sur plus de 2 000 unités immobilières.</div></div><div class="skill-card"><div class="sk-icon">🏦</div><div class="sk-title">Finance bancaire</div><div class="sk-desc">Analyse de dossiers de crédit immobilier, gestion back-office bancaire, contrôle des opérations, relation avec banques, experts-comptables et administrations fiscales.</div></div><div class="skill-card"><div class="sk-icon">⚙️</div><div class="sk-title">Outils &amp; ERP</div><div class="sk-desc">Excel avancé, Microsoft Office, ERP comptables et outils de gestion administrative et financière. Intégration et suivi des données, adaptation rapide aux environnements existants.</div></div><div class="skill-card"><div class="sk-icon">🔍</div><div class="sk-title">Analyse &amp; Reporting</div><div class="sk-desc">Analyse financière, reporting interne, tableaux de bord, suivi de trésorerie et recouvrement. Capacité d\'analyse et de structuration pour la prise de décision.</div></div><div class="skill-card"><div class="sk-icon">🤝</div><div class="sk-title">Flexibilité &amp; Rigueur</div><div class function showPage(id) {
  if (!PAGES[id]) return;
  // Swap content
  document.getElementById('app').innerHTML = PAGES[id];
  // Update tabs
  var allTabs = document.querySelectorAll('.tab-btn, .mobile-tab');
  for (var i=0;i<allTabs.length;i++) {
    allTabs[i].classList.toggle('active', allTabs[i].getAttribute('data-page')===id);
  }
  // Scroll to very top of page
  window.scrollTo(0,0);
  document.getElementById('app').scrollTop = 0;
  // Close mobile menu
  document.getElementById('mobileMenu').classList.remove('open');
  // Re-wire form if contact page
  if (id==='contact') wireForm();
}

function wireForm() {
  var form = document.getElementById('contactForm');
  if (!form) return;
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = form.querySelector('.btn-send');
    btn.textContent = 'Envoi en cours…';
    btn.disabled = true;
    fetch(form.action, {method:'POST',body:new FormData(form),headers:{Accept:'application/json'}})
      .then(function(r){
        if(r.ok){form.reset();document.getElementById('formSuccess').style.display='block';btn.textContent='Envoyé ✓';}
        else{btn.textContent='Erreur — réessayez';btn.disabled=false;}
      }).catch(function(){btn.textContent='Erreur — réessayez';btn.disabled=false;});
  });
}

// Global click delegation
document.addEventListener('click', function(e) {
  var el = e.target;
  for (var i=0;i<4;i++) {
    if (!el) break;
    var pg = el.getAttribute && el.getAttribute('data-page');
    if (pg) { showPage(pg); return; }
    el = el.parentElement;
  }
  // Hamburger
  if (document.getElementById('hamburgerBtn').contains(e.target)) {
    document.getElementById('mobileMenu').classList.toggle('open');
  }
});

// Init
showPage('accueil');

})();
